[colors]
background = #282A36
background-alt = #44475A
foreground = #F8F8F2
primary = #FF79C6
secondary = #8BE9FD
alert = #F1FA8C
disabled = #6272A4

[bar/primary]
monitor = eDP1

width = 100%
height = 20pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 3

module-margin = 3

separator =
separator-foreground = ${colors.disabled}

font-0 = adwaita sans;2
font-1 = Symbols\ Nerd\ Font\ Mono:style=Regular

modules-left = xworkspaces xwindow
modules-right = filesystem battery pulseaudio backlight memory cpu wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

override-redirect = true

[bar/secondary]
monitor = DP1

width = 100%
height = 20pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 1
padding-right = 3

module-margin = 3

separator = 
separator-foreground = ${colors.disabled}

font-0 = adwaita sans;2
font-1 = Symbols\ Nerd\ Font\ Mono:style=Regular

modules-left = xworkspaces xwindow
modules-right = filesystem battery pulseaudio backlight memory cpu wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 3

label-occupied = %name%
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#FF79C6}ÔÉá%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 99
low-at = 15
poll-interval = 5
label-charging = %percentage%%
label-discharging = %percentage%%
format-charging = %{F#FF79C6}<ramp-capacity> %{F-}<label-charging>
format-discharging = %{F#FF79C6}<ramp-capacity> %{F-}<label-discharging>
label-full = %{F#FF79C6}ůįĀĻ %{F-}%percentage%%
label-low = %{F#FF79C6}ůįāÉ %{F-}%percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

[module/pulseaudio]
type = internal/pulseaudio

format-ramp-volume-foreground = ${colors.primary}
format-volume = <ramp-volume> <label-volume>

label-volume = %percentage%%
ramp-volume-0 = ůįēŅ
ramp-volume-0-foreground = ${colors.primary}
ramp-volume-1 = ůįĖÄ
ramp-volume-1-foreground = ${colors.primary}
ramp-volume-2 = ůįēĺ
ramp-volume-2-foreground = ${colors.primary}

label-muted = ůįĖĀ
label-muted-foreground = ${colors.disabled}

[module/backlight]
type = custom/script
interval = 5
exec = xbacklight -get | cut -d. -f1

scroll-up = exec xbacklight -inc 5
scroll-down = exec xbacklight -dec 5

format = <label>

label = " %output%%"
format-prefix = ÓĆć
format-prefix-foreground = ${colors.primary}

label-layout = %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ"
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#FF79C6}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#FF79C6}Ôáę%{F-} %essid%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#FF79C6}%ifname%%{F-}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
